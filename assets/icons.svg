<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
<defs></defs>

<!-- Brand mark: eclipse -->
<symbol id="i-mark" viewBox="0 0 32 32">
  <circle cx="16" cy="16" r="11" fill="none" stroke="currentColor" stroke-width="1.4"/>
  <path d="M16 5a11 11 0 0 0 0 22 8 8 0 0 1 0-22z" fill="currentColor" opacity="0.9"/>
</symbol>

<!-- Trifox / FoxGrid : triangular fox -->
<symbol id="i-trifox" viewBox="0 0 48 48">
