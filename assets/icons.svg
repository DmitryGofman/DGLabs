    <circle cx="29.5" cy="22" r="0.9" fill="currentColor"/>
  </g>
</symbol>

<!-- Avirlog : decision triangle structure -->
<symbol id="i-avirlog" viewBox="0 0 48 48">
  <g fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round">
    <path d="M24 8 L40 36 L8 36 Z"/>
