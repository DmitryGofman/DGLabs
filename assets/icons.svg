    <circle cx="16" cy="36" r="2.2" fill="none"/>
    <circle cx="32" cy="36" r="2.2" fill="none"/>
  </g>
</symbol>

<!-- Breath Tracker : breath circle + waveform -->
<symbol id="i-breath" viewBox="0 0 48 48">
